<!DOCTYPE html>
{% load static %}
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会議室予約 | {% block title %}{% endblock title %}</title>
    <link rel="icon" href="{% static 'img/favicon.png' %}" sizes="any">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    
</head>
<body class="bg-gray-100" x-data="{ sidebarOpen: window.innerWidth >= 768 }">

    <!-- Navbar -->
    {% include "navbar.html" %}

    <div class="flex h-screen pt-16">
        <!-- Sidebar -->
        <div class="flex-shrink-0 transition-all duration-300 overflow-hidden bg-gray-900"
            :style="sidebarOpen ? (window.innerWidth < 768 ? 'width:100vw' : 'width:256px') : 'width:0px'"
        >
            {% include "sidebar.html" %}
        </div>

        <!-- Main Content -->
        <div class="content-wrap flex-1 overflow-y-auto">
            <main class="p-6">
                {% block content %}{% endblock content %}
            </main>
        </div>
    </div>

    {% block script %}{% endblock script %}

</body>
</html>

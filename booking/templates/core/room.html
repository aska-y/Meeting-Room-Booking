{% extends "core/base.html" %}

{% block title %}Room{% endblock title %}

{% block content %}

<h1 class="text-2xl font-bold text-gray-800 mb-2 mt-2">{{ room }}</h1>

<!-- Breadcrumb -->
<nav class="flex items-center text-sm text-gray-500 mb-6">
    <a href="{% url 'home' %}" class="hover:text-indigo-600 transition-colors">Home</a>
    <span class="mx-2">/</span>
    <span class="text-gray-700">{{ room }}</span>
</nav>

<!-- Calendar -->
<div class="mb-8 bg-white rounded-lg shadow p-4">
    <div id="calendar"></div>
</div>

<!-- Cancel/Confirm Buttons -->
<div class="flex justify-end items-center gap-4 mb-8">
    <a
        href="{% url 'room' room.pk %}"
        id="cancelBtn"
        class="px-4 py-2 rounded bg-gray-400 text-white text-sm opacity-50 pointer-events-none transition-colors hover:bg-gray-500"
    >
        キャンセル
    </a>
    <form action="" method="POST">
        {% csrf_token %}
        <input type="hidden" name="room" value="{{ room.pk }}">
        <input type="hidden" name="user" value="{{ user.pk }}">
        <input type="hidden" name="title" value="" id="inputTitle">
        <input type="hidden" name="start_time" value="" id="inputStartTime">
        <input type="hidden" name="end_time" value="" id="inputEndTime">
        <button
            id="confirmBtn"
            type="submit"
            class="px-4 py-2 rounded bg-blue-600 text-white text-sm opacity-50 pointer-events-none transition-colors hover:bg-blue-700"
        >
            予約を確定する
        </button>
    </form>
</div>

{% endblock content %}


{% block script %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        //日時をDjangoに適した形にフォーマット
        function formatDateTime(datetime){
            const year = datetime.getFullYear();
            const month = String(datetime.getMonth()+1).padStart(2, '0');
            const day = String(datetime.getDate()).padStart(2, '0');
            const hour = String(datetime.getHours()).padStart(2, '0');
            const minutes = String(datetime.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hour}:${minutes}`;
        }

        //FullCalendar
        var calendarEl = document.getElementById('calendar');

        // Djangoから渡された予約情報のJSON
        const eventsJson = '{{ events|default:"[]"|safe }}';

        let events = [];
        if (eventsJson && eventsJson.trim() !== '') {
            try {
                events = JSON.parse(eventsJson);
            } catch (e) {
                console.error("JSONのパースに失敗しました:", e);
            }
        }

        const isMobile = () => window.innerWidth < 768;

        //FullCalendar設定
        var calendar = new FullCalendar.Calendar(calendarEl, {
            events: events,
            initialView: isMobile() ? 'timeGridDay' : 'timeGridWeek',
            allDaySlot: false,
            height: isMobile() ? 600 : 650,
            locale: 'ja',
            firstDay: 1,
            slotLabelFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
            timeZone: 'Asia/Tokyo',
            slotMinTime: '08:00:00',
            slotMaxTime: '20:00:00',
            slotDuration: '00:30:00',
            businessHours: true,
            headerToolbar: isMobile()
                ? { left: 'prev,next', center: 'title', right: 'today' }
                : { left: 'prev,next today', center: 'title', right: 'timeGridWeek,timeGridDay' },
            windowResize: function() {
                if (isMobile()) {
                    calendar.changeView('timeGridDay');
                    calendar.setOption('height', 600);
                    calendar.setOption('headerToolbar', { left: 'prev,next', center: 'title', right: 'today' });
                } else {
                    calendar.changeView('timeGridWeek');
                    calendar.setOption('height', 650);
                    calendar.setOption('headerToolbar', { left: 'prev,next today', center: 'title', right: 'timeGridWeek,timeGridDay' });
                }
            },
            eventBackgroundColor: '#eb8b73',
            eventBorderColor: '#d45f42',

            selectable: true,
            selectOverlap: false,
            //新規予約
            select: function(info){
                const bookingTitle = prompt('予約件名を入力してください')
                if(bookingTitle){
                    calendar.addEvent({
                        title: bookingTitle,
                        start: info.start,
                        end: info.end,
                    });
                    //formに入力値を反映、ボタンを有効化
                    document.getElementById('inputTitle').value = bookingTitle;
                    document.getElementById('inputStartTime').value = formatDateTime(info.start);
                    document.getElementById('inputEndTime').value = formatDateTime(info.end);
                    document.getElementById('confirmBtn').classList.remove('opacity-50', 'pointer-events-none');
                    document.getElementById('cancelBtn').classList.remove('opacity-50', 'pointer-events-none');
                }
            },

            //予約の削除
            eventClick: function(info) {
                if (confirm('この予約を削除してよろしいですか？')) {
                    let eventId = info.event.id;
                    let url = `/delete_event/${eventId}/`;
                    fetch(url, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken'),
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ event_id: eventId }),
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            info.event.remove();
                        }
                    });
                }
            }
        });
        calendar.render();

        // サイドバー開閉でメインコンテンツ幅が変わったとき、カレンダーをリサイズ
        const mainContent = document.querySelector('.content-wrap');
        if (mainContent) {
            new ResizeObserver(() => calendar.updateSize()).observe(mainContent);
        }
    });

    // CSRFトークンを取得するヘルパー関数
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            let cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock script %}

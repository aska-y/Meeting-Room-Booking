<nav class="fixed top-0 left-0 right-0 z-50 flex items-center h-16 bg-gray-800 text-white px-4 shadow-md">
    <!-- Sidebar Toggle -->
    <button
        @click="sidebarOpen = !sidebarOpen"
        class="text-gray-300 hover:text-white mr-4 focus:outline-none"
    >
        <i class="fas fa-bars text-lg"></i>
    </button>

    <!-- Navbar Brand -->
    <a href="{% url 'home' %}" class="text-white font-semibold text-lg hover:text-gray-300 transition-colors">
        会議室予約システム
    </a>

    <!-- Login/Logout -->
    <div class="ml-auto">
        {% if user.is_authenticated %}
        <form action="{% url 'logout' %}" method="post">{% csrf_token %}
            <button type="submit" class="border border-blue-400 text-blue-400 hover:bg-blue-400 hover:text-gray-900 px-4 py-1.5 rounded text-sm transition-colors">
                Logout
            </button>
        </form>
        {% else %}
        <a href="{% url 'login' %}" class="border border-blue-400 text-blue-400 hover:bg-blue-400 hover:text-gray-900 px-4 py-1.5 rounded text-sm transition-colors">
            Login
        </a>
        {% endif %}
    </div>
</nav>
